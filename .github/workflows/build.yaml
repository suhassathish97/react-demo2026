name: React Demo Build
on:
  push:
    branches:
      - main

    pull_request:
      branches:
        - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dependencies
        run: npm install
      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
